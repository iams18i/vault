networks:
  # Fixed name so other compose projects can attach: `external: true` + `name: expenses_network`
  expenses_network:
    external: true

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: expenses
      POSTGRES_PASSWORD: expenses
      POSTGRES_DB: expenses
    ports:
      - "0.0.0.0:5432:5432"
    networks:
      default:
      expenses_network:

    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U expenses -d expenses" ]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  # Runs drizzle-kit migrate once, then exits (0 = app can start)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgres://expenses:expenses@db:5432/expenses
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://expenses:expenses@db:5432/expenses
      NUXT_DATABASE_URL: postgres://expenses:expenses@db:5432/expenses
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
