services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: expenses
      POSTGRES_PASSWORD: expenses
      POSTGRES_DB: expenses
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://expenses:expenses@db:5432/expenses
      NUXT_DATABASE_URL: postgres://expenses:expenses@db:5432/expenses
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      - db

volumes:
  pgdata:
