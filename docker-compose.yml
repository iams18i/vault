services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: expenses
      POSTGRES_PASSWORD: expenses
      POSTGRES_DB: expenses
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://expenses:expenses@db:5432/expenses
      HOST: 0.0.0.0
      NODE_ENV: development
    depends_on:
      - db
    command: pnpm dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.nuxt

volumes:
  pgdata:
